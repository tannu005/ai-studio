version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - SUPABASE_URL=https://bqbafpkrwzkdrwvkbvsy.supabase.co
      - SUPABASE_JWT_SECRET=your-jwt-secret-key
      - FLASK_ENV=production
    volumes:
      - backend-static:/app/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_SUPABASE_URL=https://bqbafpkrwzkdrwvkbvsy.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key
    depends_on:
      - backend

volumes:
  backend-static:
